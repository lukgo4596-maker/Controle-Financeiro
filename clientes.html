<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cida Finanças | Clientes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23db2777' stroke-width='2'%3E%3Cpath d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'/%3E%3Ccircle cx='12' cy='7' r='4'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="clientes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="header-row">
        <button class="back-button" id="backButton">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="logo-area">
          <span class="logo-text">Clientes</span>
        </div>
        <div class="header-actions">
          <button class="logout-button" id="logoutBtn" title="Sair">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
          <button class="menu-button" id="menuButton">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="dropdown-menu hidden" id="dropdownMenu">
        <a href="dash.html" class="dropdown-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Dashboard</span>
        </a>
        <a href="clientes.html" class="dropdown-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Clientes</span>
        </a>
      </div>
    </header>

    <main>
      <!-- Barra de busca e filtros -->
      <div class="search-section">
        <div class="search-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Buscar cliente...">
        </div>
        
        <div class="filter-bar">
          <button class="filter-chip active" data-filter="all">Todos</button>
          <button class="filter-chip" data-filter="active">Com pendências</button>
          <button class="filter-chip" data-filter="paid">Pagos</button>
        </div>

        <div class="sort-bar">
          <span class="sort-label">Ordenar por:</span>
          <select id="sortSelect" class="sort-select">
            <option value="nome">Nome A-Z</option>
            <option value="valor">Valor em aberto</option>
            <option value="tempo">Tempo de dívida</option>
          </select>
        </div>
      </div>

      <!-- Lista de clientes -->
      <div class="clientes-list" id="clientesList">
        <div class="loading-placeholder">Carregando clientes...</div>
      </div>
    </main>

    <button class="fab" id="fabAddBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <!-- Modal: Novo Cliente / Editar Cliente -->
    <div id="clienteModal" class="modal-overlay hidden">
      <div class="modal-container">
        <div class="modal-header">
          <h3 id="clienteModalTitle">Novo Cliente</h3>
          <button class="close-modal" id="closeClienteModal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form id="clienteForm">
          <input type="hidden" id="clienteId">
          <div class="input-group">
            <label>Nome completo</label>
            <input type="text" id="clienteNome" required placeholder="Ex: Maria Silva" class="input-moderno">
          </div>
          <div class="input-group">
            <label>Telefone</label>
            <input type="tel" id="clienteTelefone" placeholder="(11) 99999-9999" class="input-moderno" maxlength="15">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancelClienteBtn">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal: Detalhes do Cliente + Dívidas -->
    <div id="detalhesModal" class="modal-overlay hidden">
      <div class="modal-container large-modal">
        <div class="modal-header">
          <h3 id="detalhesClienteNome">Detalhes do Cliente</h3>
          <button class="close-modal" id="closeDetalhesModal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        
        <div class="cliente-info-panel">
          <div class="info-row">
            <span class="info-label">Telefone:</span>
            <span id="detalhesTelefone">—</span>
          </div>
          <div class="info-row">
            <span class="info-label">Total pendente:</span>
            <span id="detalhesTotalPendente" class="valor-destaque">R$ 0,00</span>
          </div>
          <div class="info-row">
            <span class="info-label">Cliente desde:</span>
            <span id="detalhesCriadoEm">—</span>
          </div>
          <button class="btn-editar-cliente" id="editarClienteBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 3l4 4-7 7H10v-4l7-7z"/>
              <path d="M4 20h16"/>
            </svg>
            Editar informações
          </button>
        </div>

        <div class="dividas-header">
          <h4>Dívidas do Cliente</h4>
          <button class="btn-nova-divida" id="btnNovaDivida">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nova dívida
          </button>
        </div>

        <div class="dividas-list" id="dividasList">
          <div class="loading-placeholder">Carregando dívidas...</div>
        </div>
      </div>
    </div>

    <!-- Modal: Adicionar/Editar Dívida -->
    <div id="dividaModal" class="modal-overlay hidden">
      <div class="modal-container">
        <div class="modal-header">
          <h3 id="dividaModalTitle">Nova Dívida</h3>
          <button class="close-modal" id="closeDividaModal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form id="dividaForm">
          <input type="hidden" id="dividaId">
          <input type="hidden" id="dividaClienteId">
          <div class="input-group">
            <label>Produto/Serviço</label>
            <input type="text" id="dividaProduto" required placeholder="Ex: Perfume, Creme, Bolo..." class="input-moderno">
          </div>
          <div class="input-group">
            <label>Valor total (R$)</label>
            <input type="text" id="dividaValorTotal" required placeholder="0,00" class="input-moderno money-mask">
          </div>
          <div class="input-group">
            <label>Parcelamento</label>
            <div class="parcelamento-group">
              <select id="dividaParcelas" class="input-moderno" style="flex: 1;">
                <option value="1">1x (sem juros)</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
                <option value="4">4x</option>
                <option value="5">5x</option>
                <option value="6">6x</option>
                <option value="7">7x</option>
                <option value="8">8x</option>
                <option value="9">9x</option>
                <option value="10">10x</option>
                <option value="11">11x</option>
                <option value="12">12x</option>
              </select>
              <span class="parcela-valor" id="valorParcelaDisplay">R$ 0,00</span>
            </div>
          </div>
          <div class="input-group">
            <label>Data de pagamento (primeira parcela)</label>
            <input type="date" id="dividaDataPagamento" required class="input-moderno">
          </div>
          <div class="input-group">
            <label>Status</label>
            <select id="dividaStatus" class="input-moderno">
              <option value="pendente">Pendente</option>
              <option value="pago">Pago</option>
            </select>
          </div>
          <div class="input-group">
            <label>Observações</label>
            <textarea id="dividaObservacoes" rows="2" placeholder="Observações sobre esta dívida..." class="input-moderno"></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancelDividaBtn">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="clientes.js"></script>
</body>
</html>
